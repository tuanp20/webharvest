<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHarvest - Kết quả thanh toán</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- CSS (Identical Premium Styles) -->
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-card: rgba(255, 255, 255, 0.85);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-purple: #5e5ce6;
            --accent-pink: #d33d95;
            --accent-blue: #0071e3;
            --success: #28cd41;
            --error: #ff3b30;
            --apple-hairline: rgba(0, 0, 0, 0.08);
            --font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            --gradient-primary: var(--accent-blue);
            --gradient-glow: linear-gradient(135deg, rgba(94, 92, 230, 0.05), rgba(0, 113, 227, 0.02));
            --glow-shadow: 0 0 50px rgba(94, 92, 230, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(94, 92, 230, 0.04) 0%, rgba(255, 255, 255, 0) 70%);
            z-index: -1;
            filter: blur(50px);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 24px;
        }

        .status-card {
            background: var(--bg-card);
            border: 1px solid var(--apple-hairline);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05), var(--glow-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .status-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            transition: all 0.3s;
        }

        .status-icon.loading {
            background: rgba(94, 92, 230, 0.1);
            color: var(--accent-purple);
            animation: rotate 2s linear infinite;
        }

        .status-icon.success {
            background: rgba(40, 205, 65, 0.1);
            color: var(--success);
            box-shadow: 0 0 20px rgba(40, 205, 65, 0.2);
        }

        .status-icon.error {
            background: rgba(255, 59, 48, 0.1);
            color: var(--error);
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.2);
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        p.message {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* License Key Display Box */
        .key-container {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--apple-hairline);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            display: none;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .key-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-purple);
            letter-spacing: 0.05em;
        }

        .key-value-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .key-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            flex-grow: 1;
            background: none;
            border: none;
            outline: none;
            width: 100%;
        }

        .btn-copy {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid var(--apple-hairline);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 113, 227, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 113, 227, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--apple-hairline);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .copied-tooltip {
            font-size: 11px;
            color: var(--success);
            font-weight: 600;
            text-align: right;
            display: none;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="container">
        <div class="status-card">
            <!-- Loading Icon -->
            <div id="icon-container" class="status-icon loading">
                <i data-lucide="loader-2" style="width: 36px; height: 36px;"></i>
            </div>
            
            <h1 id="status-title">Đang xác minh thanh toán...</h1>
            <p id="status-message" class="message">Hệ thống đang kết nối đến cổng PayOS để kiểm tra kết quả giao dịch. Quá trình này có thể mất vài giây.</p>

            <!-- License Key Display Box -->
            <div id="key-container" class="key-container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="key-label">LICENSE KEY CỦA BẠN</span>
                    <span id="copied-msg" class="copied-tooltip">Đã sao chép!</span>
                </div>
                <div class="key-value-wrapper">
                    <input type="text" id="license-key-val" class="key-value" value="WH-XXXXX-XXXXX-XXXXX" readonly>
                    <button class="btn-copy" onclick="copyKey()" title="Sao chép License Key">
                        <i data-lucide="copy" style="width: 16px; height: 16px;"></i>
                    </button>
                </div>
            </div>

            <!-- Action buttons -->
            <div id="action-buttons" style="display: none;">
                <a href="/" class="btn btn-primary">Quay lại trang chủ</a>
            </div>
        </div>
    </div>

    <script>
        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const orderCodeStr = urlParams.get('orderCode');
        const payosStatus = urlParams.get('status');

        let pollAttempts = 0;
        const maxPollAttempts = 15;

        async function verifyPayment() {
            if (!orderCodeStr) {
                showError('Mã đơn hàng không hợp lệ.', 'Không tìm thấy thông tin mã đơn hàng từ cổng thanh toán.');
                return;
            }

            const orderCode = parseInt(orderCodeStr, 10);
            if (isNaN(orderCode)) {
                showError('Mã đơn hàng không hợp lệ.', 'Mã đơn hàng định dạng không đúng.');
                return;
            }

            // Immediately fail if PayOS explicitly cancelled
            if (payosStatus === 'CANCELLED') {
                showError('Thanh toán đã bị huỷ', 'Bạn đã huỷ giao dịch trên cổng thanh toán PayOS.');
                return;
            }

            try {
                const resp = await fetch('/api/payments/verify-pending', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_code: orderCode })
                });

                const data = await resp.json();
                if (data.success && data.data) {
                    const status = data.data.status;
                    if (status === 'paid') {
                        const key = data.data.key || 'Vui lòng kiểm tra hộp thư email để lấy Key bản quyền';
                        showSuccess(key);
                    } else if (status === 'cancelled') {
                        showError('Giao dịch đã bị huỷ', 'Giao dịch thanh toán đã bị huỷ hoặc hết hạn trên PayOS.');
                    } else {
                        // Pending — poll again after delay
                        scheduleNextPoll();
                    }
                } else {
                    scheduleNextPoll();
                }
            } catch (e) {
                scheduleNextPoll();
            }
        }

        function scheduleNextPoll() {
            pollAttempts++;
            if (pollAttempts >= maxPollAttempts) {
                showError(
                    'Đang chờ xử lý giao dịch', 
                    'Hệ thống chưa nhận được phản hồi thanh toán thành công từ ngân hàng của bạn. Nếu bạn đã chuyển khoản thành công, xin vui lòng kiểm tra email sau vài phút.'
                );
                return;
            }
            setTimeout(verifyPayment, 2000);
        }

        function showSuccess(key) {
            const iconContainer = document.getElementById('icon-container');
            const statusTitle = document.getElementById('status-title');
            const statusMsg = document.getElementById('status-message');
            const keyContainer = document.getElementById('key-container');
            const licenseKeyVal = document.getElementById('license-key-val');
            const actionButtons = document.getElementById('action-buttons');

            iconContainer.className = 'status-icon success';
            iconContainer.innerHTML = '<i data-lucide="check-circle-2" style="width: 36px; height: 36px;"></i>';
            statusTitle.textContent = 'Thanh toán thành công!';
            statusMsg.textContent = 'Giao dịch của bạn đã được đối soát thành công. Hệ thống đã gửi email thông tin bản quyền và hướng dẫn sử dụng vào email đăng ký của bạn.';

            if (key) {
                licenseKeyVal.value = key;
                keyContainer.style.display = 'flex';
            }

            actionButtons.style.display = 'block';
            
            // Re-render icons
            lucide.createIcons();
        }

        function showError(title, msg) {
            const iconContainer = document.getElementById('icon-container');
            const statusTitle = document.getElementById('status-title');
            const statusMsg = document.getElementById('status-message');
            const actionButtons = document.getElementById('action-buttons');

            iconContainer.className = 'status-icon error';
            iconContainer.innerHTML = '<i data-lucide="alert-circle" style="width: 36px; height: 36px;"></i>';
            statusTitle.textContent = title;
            statusMsg.textContent = msg;
            actionButtons.style.display = 'block';

            // Re-render icons
            lucide.createIcons();
        }

        function copyKey() {
            const copyText = document.getElementById('license-key-val');
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);

            const copiedMsg = document.getElementById('copied-msg');
            copiedMsg.style.display = 'inline';
            setTimeout(() => {
                copiedMsg.style.display = 'none';
            }, 2000);
        }

        // Initialize verification on DOM content loaded
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            verifyPayment();
        });
    </script>
</body>
</html>
